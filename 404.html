<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>FastTypingLab</title>
    <script type="text/javascript">
      // GitHub Pages SPA fix — redirect /path to /?p=/path
      // so that index.html can restore the correct route
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
